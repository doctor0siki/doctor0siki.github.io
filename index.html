<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fukumax 2.0</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#0B0810; --ink:#ECEAF6; --muted:#9A93AD;
    --yellow:#FFC300; --blue:#2A93FF; --purple:#A06CF0; --green:#27AE60; --red:#EB4637;
    --card:rgba(255,255,255,.045); --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; color:var(--ink); padding:0 20px 72px;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.9; -webkit-font-smoothing:antialiased; letter-spacing:.01em;
    background:
      radial-gradient(1100px 560px at 12% -8%, rgba(42,147,255,.22), transparent 60%),
      radial-gradient(980px 680px at 112% 6%, rgba(160,108,240,.20), transparent 55%),
      radial-gradient(860px 520px at 50% 122%, rgba(255,195,0,.12), transparent 60%),
      linear-gradient(180deg,#0B0810,#0E0A18 42%,#0B0810);
    background-attachment:fixed; min-height:100vh;
  }
  .wrap{max-width:860px;margin:0 auto;}

  /* ===== Fukumax 2.0 ロゴ ===== */
  .hero{padding:80px 0 44px;text-align:center;}
  .brand{
    display:inline-flex;align-items:baseline;gap:.12em;
    font-weight:900;font-size:clamp(2.6rem,10vw,5rem);line-height:1;
    letter-spacing:.02em;
  }
  .brand .fuku{
    background:linear-gradient(180deg,#ffffff 0%,#cdd8ff 55%,#8fa9ff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(42,147,255,.55);
  }
  .brand .ver{
    font-size:.42em;font-weight:900;color:#0B0810;
    background:linear-gradient(180deg,#FFD24D,#FFC300);
    padding:.18em .5em;border-radius:.4em;transform:translateY(-.55em);
    box-shadow:0 0 26px rgba(255,195,0,.6), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .hero .tagline{
    margin:1.1em 0 0;color:var(--muted);font-size:1rem;font-weight:600;letter-spacing:.06em;
  }
  .rule{
    width:64px;height:4px;margin:26px auto 0;border-radius:999px;
    background:linear-gradient(90deg,var(--blue),var(--purple),var(--yellow));
    box-shadow:0 0 20px rgba(160,108,240,.6);
  }

  /* ===== セクション見出し ===== */
  .section-title{
    font-size:.82rem;font-weight:800;letter-spacing:.22em;color:var(--muted);
    text-transform:uppercase;margin:48px 0 14px;text-align:center;
  }

  /* ===== 作品カード ===== */
  .work{
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:30px 26px 34px;box-shadow:0 18px 60px rgba(0,0,0,.45);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    text-align:center;position:relative;overflow:hidden;
  }
  .work::before{
    content:"";position:absolute;inset:-1px -1px auto -1px;height:3px;
    background:linear-gradient(90deg,var(--yellow),var(--red),var(--purple),var(--blue));
    opacity:.85;
  }
  .work img.logo{
    max-width:min(420px,80%);height:auto;
    filter:drop-shadow(0 12px 30px rgba(0,0,0,.55));
    margin:6px auto 4px;display:block;
  }
  .work h2{
    margin:.2em 0 .1em;font-size:1.5rem;font-weight:900;color:#fff;
    text-shadow:0 0 24px rgba(255,195,0,.3);
  }
  .work .catch{color:var(--yellow);font-weight:700;margin:.2em 0 .6em;text-shadow:0 0 16px rgba(255,195,0,.4);}
  .work .desc{color:#c8c4d6;max-width:560px;margin:.4em auto 1.4em;font-size:.96rem;}

  .btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .btn{
    display:inline-flex;align-items:center;gap:.5em;font-weight:800;text-decoration:none;
    padding:13px 26px;border-radius:12px;font-size:.98rem;
  }
  .btn-yellow{
    color:#0B0810;background:linear-gradient(180deg,#FFD24D,#FFC300);
    box-shadow:0 8px 26px rgba(255,195,0,.4), inset 0 1px 0 rgba(255,255,255,.45);
  }
  .btn-yellow:hover{filter:brightness(1.05);box-shadow:0 10px 32px rgba(255,195,0,.55);}
  .btn-ghost{
    color:#cfe0ff;border:1px solid rgba(42,147,255,.45);background:rgba(42,147,255,.08);
  }
  .btn-ghost:hover{background:rgba(42,147,255,.16);box-shadow:0 0 22px rgba(42,147,255,.35);}

  .foot{text-align:center;color:var(--muted);font-size:.78rem;margin-top:52px;line-height:1.7;}
  .foot .creed{opacity:.6;letter-spacing:.08em;}
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="brand"><span class="fuku">Fukumax</span><span class="ver">2.0</span></div>
    <p class="tagline">個人開発アプリ・ゲームスタジオ</p>
    <div class="rule"></div>
  </header>

  <p class="section-title">Works</p>

  <section class="work">
    <img class="logo" src="./images/shachiku-puzzle.png" alt="社畜パズル ロゴ">
    <h2>社畜パズル</h2>
    <p class="catch">同じ役職で合体して出世せよ！</p>
    <p class="desc">役職の顔ピースを落として合体させ、社長を目指す落ち物パズルゲーム。自分や仲間の顔・声を取り込んで遊べます（取り込んだ写真・音声は端末内でのみ利用され、外部に送信されません）。</p>
    <div class="btns">
      <a class="btn btn-yellow" href="./support.html">🛟 サポート</a>
      <a class="btn btn-ghost" href="./privacy.html">🔒 プライバシーポリシー</a>
    </div>
  </section>

  <p class="foot">
    <span class="creed">今週の社訓　1. 我慢　2. 忍耐　3. 従順</span><br>
    © Fukumax 2.0
  </p>

</div>
</body>
</html>
